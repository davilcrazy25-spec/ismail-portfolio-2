<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ismail Portfolio</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h2>Admin Login</h2>
                    <p>Ismail Portfolio Dashboard</p>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                <div id="loginError" class="error-message"></div>
            </div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="dashboard" class="dashboard" style="display: none;">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Ismail Admin</h2>
                <p>Portfolio Management</p>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="#" class="nav-link active" data-section="portfolio">
                            <i class="fas fa-images"></i>
                            <span>Portfolio</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link" data-section="about">
                            <i class="fas fa-user"></i>
                            <span>About</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link" data-section="services">
                            <i class="fas fa-cogs"></i>
                            <span>Services</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link" data-section="testimonials">
                            <i class="fas fa-comments"></i>
                            <span>Testimonials</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link" data-section="contact">
                            <i class="fas fa-envelope"></i>
                            <span>Contact</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link" id="logoutBtn">
                            <i class="fas fa-sign-out-alt"></i>
                            <span>Logout</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1 id="sectionTitle">Portfolio Management</h1>
                <button id="addNewBtn" class="btn btn-primary">
                    <i class="fas fa-plus"></i>
                    Add New
                </button>
            </header>

            <!-- Portfolio Section -->
            <section id="portfolioSection" class="content-section active">
                <div class="content-grid">
                    <div class="portfolio-list" id="portfolioList">
                        <!-- Portfolio items will be loaded here -->
                    </div>
                </div>
            </section>

            <!-- About Section -->
            <section id="aboutSection" class="content-section">
                <div class="content-form">
                    <form id="aboutForm">
                        <div class="form-group">
                            <label for="aboutTitle">Professional Title</label>
                            <input type="text" id="aboutTitle" name="aboutTitle" placeholder="e.g., Creative Graphic Designer">
                        </div>
                        <div class="form-group">
                            <label for="aboutBio">Professional Bio</label>
                            <textarea id="aboutBio" name="aboutBio" rows="6" placeholder="Your professional biography..."></textarea>
                        </div>
                        <div class="form-group">
                            <label for="aboutExperience">Years of Experience</label>
                            <input type="number" id="aboutExperience" name="aboutExperience" placeholder="e.g., 5">
                        </div>
                        <button type="submit" class="btn btn-primary">Update About</button>
                    </form>
                </div>
            </section>

            <!-- Services Section -->
            <section id="servicesSection" class="content-section">
                <div class="services-list" id="servicesList">
                    <!-- Services will be loaded here -->
                </div>
            </section>

            <!-- Testimonials Section -->
            <section id="testimonialsSection" class="content-section">
                <div class="testimonials-list" id="testimonialsList">
                    <!-- Testimonials will be loaded here -->
                </div>
            </section>

            <!-- Contact Section -->
            <section id="contactSection" class="content-section">
                <div class="content-form">
                    <form id="contactForm">
                        <div class="form-group">
                            <label for="contactEmail">Email</label>
                            <input type="email" id="contactEmail" name="contactEmail" placeholder="ismail@design.com">
                        </div>
                        <div class="form-group">
                            <label for="contactPhone">Phone</label>
                            <input type="tel" id="contactPhone" name="contactPhone" placeholder="+1 234 567 8900">
                        </div>
                        <div class="form-group">
                            <label for="contactLocation">Location</label>
                            <input type="text" id="contactLocation" name="contactLocation" placeholder="New York, USA">
                        </div>
                        <div class="form-group">
                            <label for="contactWhatsApp">WhatsApp</label>
                            <input type="tel" id="contactWhatsApp" name="contactWhatsApp" placeholder="+1 234 567 8900">
                        </div>
                        <button type="submit" class="btn btn-primary">Update Contact</button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Portfolio Item</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <form id="portfolioForm">
                    <input type="hidden" id="portfolioId" name="id">
                    <div class="form-group">
                        <label for="portfolioTitle">Title</label>
                        <input type="text" id="portfolioTitle" name="title" required>
                    </div>
                    <div class="form-group">
                        <label for="portfolioCategory">Category</label>
                        <select id="portfolioCategory" name="category" required>
                            <option value="">Select Category</option>
                            <option value="logo">Logo Design</option>
                            <option value="social">Social Media</option>
                            <option value="banner">Banner Design</option>
                            <option value="branding">Branding</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="portfolioImage">Image URL</label>
                        <input type="url" id="portfolioImage" name="image" placeholder="https://example.com/image.jpg">
                        <small>Or upload image below</small>
                    </div>
                    <div class="form-group">
                        <label for="portfolioImageUpload">Upload Image</label>
                        <input type="file" id="portfolioImageUpload" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label for="portfolioDescription">Description</label>
                        <textarea id="portfolioDescription" name="description" rows="4" required></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Service Modal -->
    <div id="serviceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="serviceModalTitle">Add New Service</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <form id="serviceForm">
                    <input type="hidden" id="serviceId" name="id">
                    <div class="form-group">
                        <label for="serviceTitle">Service Title</label>
                        <input type="text" id="serviceTitle" name="title" required>
                    </div>
                    <div class="form-group">
                        <label for="serviceIcon">Icon Class</label>
                        <input type="text" id="serviceIcon" name="icon" placeholder="e.g., fas fa-palette">
                    </div>
                    <div class="form-group">
                        <label for="serviceDescription">Description</label>
                        <textarea id="serviceDescription" name="description" rows="4" required></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelServiceBtn">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Testimonial Modal -->
    <div id="testimonialModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="testimonialModalTitle">Add New Testimonial</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <form id="testimonialForm">
                    <input type="hidden" id="testimonialId" name="id">
                    <div class="form-group">
                        <label for="testimonialClientName">Client Name</label>
                        <input type="text" id="testimonialClientName" name="clientName" required>
                    </div>
                    <div class="form-group">
                        <label for="testimonialClientTitle">Client Title</label>
                        <input type="text" id="testimonialClientTitle" name="clientTitle" required>
                    </div>
                    <div class="form-group">
                        <label for="testimonialText">Testimonial Text</label>
                        <textarea id="testimonialText" name="text" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="testimonialRating">Rating</label>
                        <select id="testimonialRating" name="rating" required>
                            <option value="5">5 Stars</option>
                            <option value="4">4 Stars</option>
                            <option value="3">3 Stars</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelTestimonialBtn">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
